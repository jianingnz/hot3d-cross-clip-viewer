<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOT3D — cross-clip 3D scene</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --bg-card: #161616;
    --bg-header: #1a1a1a;
    --border: #222;
    --text: #d4d4d4;
    --text-heading: #f0f0f0;
    --text-secondary: #888;
    --accent: #c98c50;
  }
  [data-theme="light"] {
    --bg: #f5f5f0;
    --bg-card: #ffffff;
    --bg-header: #f0efe8;
    --border: #ddd;
    --text: #333;
    --text-heading: #111;
    --text-secondary: #666;
    --accent: #b06f2c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
               font-family: 'Inter', system-ui, sans-serif; height: 100%; overflow: hidden; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }

  #app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; max-width: 100vw; }
  header { padding: 18px 28px; border-bottom: 1px solid var(--border);
           display: flex; justify-content: space-between; align-items: center; gap: 18px; flex-wrap: wrap; }
  h1 { font-family: 'Playfair Display', serif; font-weight: 700;
       font-size: 1.3rem; color: var(--text-heading); margin: 0; letter-spacing: -0.01em; }
  .sub { color: var(--text-secondary); font-size: 0.78rem; margin-top: 2px; }
  .toggle { background: transparent; border: 1px solid var(--border);
            color: var(--text); border-radius: 6px; padding: 6px 10px;
            cursor: pointer; font-size: 0.8rem; }

  #stage { position: relative; width: 100%; height: 100%; }
  #canvas { width: 100%; height: 100%; display: block; }
  #overlay { position: absolute; top: 12px; left: 12px; color: var(--text-secondary);
             font-family: ui-monospace, monospace; font-size: 0.75rem;
             background: rgba(0,0,0,0.55); border: 1px solid var(--border); border-radius: 6px;
             padding: 8px 10px; pointer-events: none; max-width: 260px; }
  #overlay b { color: var(--text-heading); font-family: inherit; }

  footer { padding: 12px 28px; border-top: 1px solid var(--border);
           display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  footer button { background: var(--bg-card); color: var(--text);
                  border: 1px solid var(--border); border-radius: 6px;
                  padding: 7px 14px; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
  footer button:hover { border-color: var(--accent); color: var(--accent); }
  footer input[type=range] { flex: 1; min-width: 200px; accent-color: var(--accent); }
  footer .pos { color: var(--text-secondary); font-family: ui-monospace, monospace; font-size: 0.8rem; }
  footer .pos.boundary { color: #d97a3c; }
  footer label { color: var(--text-secondary); font-size: 0.8rem; }
  footer input[type=range].size { width: 90px; }

  kbd { font-family: ui-monospace, monospace; font-size: 0.7rem;
        background: var(--bg-header); border: 1px solid var(--border);
        border-bottom-width: 2px; border-radius: 4px;
        padding: 1px 5px; color: var(--text-secondary); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>HOT3D — cross-clip 3D scene (clip 1995 ⇒ 1996)</h1>
      <div class="sub">Static MoGe-1 scene cloud · GT object cloud (per-frame, 2000 pts) · camera trail · canonical frame = clip-001995 frame 84.</div>
    </div>
    <button class="toggle" id="theme">light</button>
  </header>

  <div id="stage">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <b id="ovframe">frame 0 / 105</b><br>
      <span id="ovsrc">clip-001995 t=84</span><br>
      <span id="ovab"></span><br>
      <span id="ovstats"></span>
    </div>
  </div>

  <footer>
    <button id="play">⏵ play</button>
    <span class="pos" id="pos">0 / 105</span>
    <input id="slider" type="range" min="0" max="105" value="0">
    <label>scene <input class="size" id="size_scene" type="range" min="1" max="10" step="0.5" value="2.5"></label>
    <label>object <input class="size" id="size_obj" type="range" min="2" max="20" step="0.5" value="6"></label>
    <button id="reset">reset view</button>
    <span class="pos"><kbd>space</kbd> play · <kbd>←</kbd>/<kbd>→</kbd> step · <kbd>r</kbd> reset</span>
  </footer>
</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas = document.getElementById('canvas');
const stage  = document.getElementById('stage');

// ---- Three.js setup ----
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);

const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 50);

// Anchor frame: X-right, Y-down, Z-forward. We want a viewer
// where Y is up. Add a parent that rotates Y→up for display purposes only.
const root = new THREE.Group();
root.rotation.x = Math.PI;   // flip Y so y-down → y-up
scene.add(root);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 1.0);

const initialView = () => {
  // sit slightly behind & above the anchor camera, looking forward
  camera.position.set(-0.6, -0.3, -0.5);  // negative Y because of root flip → above
  controls.target.set(0, 0, 1.2);
  controls.update();
};
initialView();

function fit() {
  const { clientWidth: w, clientHeight: h } = stage;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', fit);

// ---- Data loading ----
async function fetchBin(url) {
  const r = await fetch(url); if (!r.ok) throw new Error(url + ' ' + r.status);
  return new Float32Array(await r.arrayBuffer());
}
async function fetchU8(url) {
  const r = await fetch(url); if (!r.ok) throw new Error(url + ' ' + r.status);
  return new Uint8Array(await r.arrayBuffer());
}

const meta  = await (await fetch('data/meta.json')).json();
const sceneArr = await fetchBin('data/scene.bin');   // (n_pts*6,) [xyzrgb]
const objArr   = await fetchBin('data/obj.bin');     // (F*K*3,)
const visArr   = await fetchU8('data/vis.bin');      // (F*K,)
const camArr   = await fetchBin('data/cam.bin');     // (F*3,)
const F = meta.obj.n_frames, K = meta.obj.n_pts;
console.log('meta', meta);

document.getElementById('ovab').textContent =
  `MoGe a=${meta.moge.a.toFixed(3)} b=${meta.moge.b.toFixed(3)}m  ` +
  `resid=${meta.moge.median_resid_mm.toFixed(0)}mm`;
document.getElementById('ovstats').textContent =
  `scene: ${meta.scene.n_pts.toLocaleString()} pts · obj: ${K} pts · F=${F}`;

// ---- Static scene cloud ----
{
  const n = sceneArr.length / 6;
  const pos = new Float32Array(n * 3), col = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    pos[3*i  ] = sceneArr[6*i  ];
    pos[3*i+1] = sceneArr[6*i+1];
    pos[3*i+2] = sceneArr[6*i+2];
    col[3*i  ] = sceneArr[6*i+3];
    col[3*i+1] = sceneArr[6*i+4];
    col[3*i+2] = sceneArr[6*i+5];
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const m = new THREE.PointsMaterial({ size: 0.0025, vertexColors: true,
                                       sizeAttenuation: true, depthWrite: false,
                                       transparent: true, opacity: 0.9 });
  window._sceneMat = m;
  root.add(new THREE.Points(g, m));
}

// ---- Per-frame object cloud ----
const objColor = new THREE.Color(meta.color_obj[0]/255, meta.color_obj[1]/255, meta.color_obj[2]/255);
const objGeom = new THREE.BufferGeometry();
const objPos  = new Float32Array(K * 3);
objGeom.setAttribute('position', new THREE.BufferAttribute(objPos, 3).setUsage(THREE.DynamicDrawUsage));
const objMat  = new THREE.PointsMaterial({ size: 0.006, color: objColor,
                                            sizeAttenuation: true, depthWrite: false });
window._objMat = objMat;
const objPts  = new THREE.Points(objGeom, objMat);
root.add(objPts);

function setFrame(fi) {
  const off = fi * K;
  let written = 0;
  for (let k = 0; k < K; k++) {
    if (visArr[off + k]) {
      const src = (off + k) * 3;
      objPos[3*written  ] = objArr[src    ];
      objPos[3*written+1] = objArr[src + 1];
      objPos[3*written+2] = objArr[src + 2];
      written++;
    }
  }
  // shrink un-rendered slots to a tiny point at origin
  for (let k = written; k < K; k++) {
    objPos[3*k] = NaN; objPos[3*k+1] = NaN; objPos[3*k+2] = NaN;
  }
  objGeom.attributes.position.needsUpdate = true;
  objGeom.setDrawRange(0, K);

  // current camera marker
  cameraMarker.position.set(camArr[3*fi], camArr[3*fi+1], camArr[3*fi+2]);

  // overlay
  const inA = fi <= (meta.video.frames_A[1] - meta.video.frames_A[0]);
  const t = inA
    ? meta.video.frames_A[0] + fi
    : meta.video.frames_B[0] + (fi - (meta.video.frames_A[1] - meta.video.frames_A[0]) - 1);
  const clip = inA ? meta.video.clip_A : meta.video.clip_B;
  document.getElementById('ovframe').textContent = `frame ${fi} / ${F-1}`;
  document.getElementById('ovsrc').innerHTML =
    `${clip} t=${t}` + (inA ? '' : '  <span style="color:#d97a3c">(crossed clip boundary)</span>');
  posEl.textContent = `${fi} / ${F-1}`;
  posEl.classList.toggle('boundary', !inA);
  slider.value = fi;
}

// ---- Camera trail (line + dot) ----
{
  const pts = [];
  for (let i = 0; i < F; i++) pts.push(new THREE.Vector3(camArr[3*i], camArr[3*i+1], camArr[3*i+2]));
  const lg = new THREE.BufferGeometry().setFromPoints(pts);
  // color the trail: clip A red-ish, clip B amber-ish
  const A_len = meta.video.frames_A[1] - meta.video.frames_A[0] + 1;
  const cols = new Float32Array(F * 3);
  for (let i = 0; i < F; i++) {
    const c = (i < A_len) ? [0.85, 0.40, 0.30] : [0.95, 0.65, 0.20];
    cols[3*i] = c[0]; cols[3*i+1] = c[1]; cols[3*i+2] = c[2];
  }
  lg.setAttribute('color', new THREE.BufferAttribute(cols, 3));
  const lm = new THREE.LineBasicMaterial({ vertexColors: true, linewidth: 2 });
  root.add(new THREE.Line(lg, lm));
}

const cameraMarker = new THREE.Mesh(
  new THREE.SphereGeometry(0.012, 12, 12),
  new THREE.MeshBasicMaterial({ color: 0xffd166 }));
root.add(cameraMarker);

// origin axes (anchor camera)
{
  const ax = new THREE.AxesHelper(0.10);
  root.add(ax);
}

// ---- UI ----
const slider = document.getElementById('slider');
const posEl  = document.getElementById('pos');
const playB  = document.getElementById('play');
const resetB = document.getElementById('reset');
slider.max = F - 1;

let frame = 0;
let playing = false;
let lastTick = 0;

function step(d) { frame = (frame + d + F) % F; setFrame(frame); }

slider.addEventListener('input', () => { frame = parseInt(slider.value, 10); setFrame(frame); });
playB.addEventListener('click', () => {
  playing = !playing; playB.textContent = playing ? '⏸ pause' : '⏵ play';
  if (playing) lastTick = performance.now();
});
resetB.addEventListener('click', initialView);
document.addEventListener('keydown', e => {
  if (e.key === ' ')          { playB.click(); e.preventDefault(); }
  if (e.key === 'ArrowRight') { step(+1); e.preventDefault(); }
  if (e.key === 'ArrowLeft')  { step(-1); e.preventDefault(); }
  if (e.key === 'r')          { initialView(); }
});

document.getElementById('size_scene').addEventListener('input', e =>
  window._sceneMat.size = parseFloat(e.target.value) * 0.001);
document.getElementById('size_obj').addEventListener('input', e =>
  window._objMat.size = parseFloat(e.target.value) * 0.001);

// theme
const themeBtn = document.getElementById('theme');
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t === 'dark' ? 'light' : 'dark';
  localStorage.setItem('hot3d_visex_theme', t);
  scene.background = new THREE.Color(t === 'dark' ? 0x0d0d0d : 0xeeece5);
}
setTheme(localStorage.getItem('hot3d_visex_theme') || 'dark');
themeBtn.addEventListener('click', () =>
  setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'));

setFrame(0);
fit();

// ---- Render loop ----
const FPS = 30;
function tick(now) {
  if (playing) {
    if (now - lastTick > 1000 / FPS) {
      step(+1);
      lastTick = now;
    }
  }
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
